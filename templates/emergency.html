{% load static %}
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .card-border { border: 2px solid #ffdad6; }
    body { min-height: max(884px, 100dvh); }
</style>
<script id="tailwind-config">tailwind.config = {darkMode: "class", theme: {extend: {colors: {"error-container": "#ffdad6", error: "#ba1a1a", background: "#f8f9ff", "on-background": "#121c2a", surface: "#f8f9ff", "on-surface": "#121c2a", "on-surface-variant": "#4a4455"}, borderRadius: {DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px"}, fontFamily: {"button-text": ["Plus Jakarta Sans"], "headline-lg": ["Plus Jakarta Sans"], "headline-md": ["Plus Jakarta Sans"], "headline-xl": ["Plus Jakarta Sans"], "body-md": ["Plus Jakarta Sans"], "label-bold": ["Plus Jakarta Sans"]}, fontSize: {"button-text": ["20px", {lineHeight: "1.2", fontWeight: "700"}], "headline-lg": ["32px", {lineHeight: "1.25", letterSpacing: "-0.01em", fontWeight: "700"}], "label-bold": ["16px", {lineHeight: "1.2", letterSpacing: "0.02em", fontWeight: "700"}], "headline-md": ["24px", {lineHeight: "1.3", fontWeight: "700"}], "headline-xl": ["40px", {lineHeight: "1.2", letterSpacing: "-0.02em", fontWeight: "800"}], "body-md": ["18px", {lineHeight: "1.6", fontWeight: "400"}]}}};</script>
<title>ฉุกเฉิน - Sweet Sixty</title>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen pb-32">

<header class="bg-[#FDFCFE] top-0 border-b-2 border-error/20 shadow-[4px_4px_0px_0px_rgba(186,26,26,0.1)] flex justify-between items-center px-6 h-20 w-full sticky z-50">
    <div class="flex items-center gap-3">
        <a href="{% url 'home' %}" class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-error/10 transition-colors active:scale-95">
            <span class="material-symbols-outlined text-error text-3xl">arrow_back</span>
        </a>
        <span class="font-['Plus_Jakarta_Sans'] font-extrabold text-2xl tracking-tight text-error">เบอร์โทรฉุกเฉิน</span>
    </div>
</header>

<main class="px-6 pt-8 max-w-2xl mx-auto">
    <div class="mb-6 text-center">
        <div class="w-24 h-24 bg-error-container rounded-full mx-auto flex items-center justify-center mb-4 border-4 border-error/20">
            <span class="material-symbols-outlined text-error text-6xl" style="font-variation-settings:'FILL' 1">emergency</span>
        </div>
        <h1 class="font-headline-xl text-headline-xl text-error mb-2">สายด่วนฉุกเฉิน</h1>
        <p class="font-body-md text-on-surface-variant">กดที่ปุ่มเพื่อโทรออกทันที</p>
    </div>

    <!-- Emergency Numbers -->
    <div class="space-y-4">
        <a href="tel:1669" class="bg-error-container p-6 rounded-[32px] border-2 border-error shadow-[0_4px_15px_rgba(186,26,26,0.2)] hover:bg-error hover:text-white transition-all active:scale-95 flex items-center justify-between group block">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center group-hover:text-error text-error">
                    <span class="material-symbols-outlined text-4xl" style="font-variation-settings:'FILL' 1">local_hospital</span>
                </div>
                <div>
                    <h2 class="font-headline-lg text-error group-hover:text-white leading-tight">1669</h2>
                    <p class="font-label-bold text-error/80 group-hover:text-white/80">เจ็บป่วยฉุกเฉิน / รถพยาบาล</p>
                </div>
            </div>
            <span class="material-symbols-outlined text-4xl text-error group-hover:text-white">call</span>
        </a>

        <a href="tel:191" class="bg-white p-6 rounded-[32px] border-2 border-error-container shadow-[0_4px_15px_rgba(0,0,0,0.05)] hover:border-error transition-all active:scale-95 flex items-center justify-between block">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 bg-error-container rounded-2xl flex items-center justify-center text-error">
                    <span class="material-symbols-outlined text-4xl" style="font-variation-settings:'FILL' 1">local_police</span>
                </div>
                <div>
                    <h2 class="font-headline-lg text-on-surface leading-tight">191</h2>
                    <p class="font-label-bold text-on-surface-variant">เหตุด่วนเหตุร้าย / แจ้งตำรวจ</p>
                </div>
            </div>
            <span class="material-symbols-outlined text-4xl text-error">call</span>
        </a>

        <a href="tel:199" class="bg-white p-6 rounded-[32px] border-2 border-error-container shadow-[0_4px_15px_rgba(0,0,0,0.05)] hover:border-error transition-all active:scale-95 flex items-center justify-between block">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 bg-error-container rounded-2xl flex items-center justify-center text-error">
                    <span class="material-symbols-outlined text-4xl" style="font-variation-settings:'FILL' 1">local_fire_department</span>
                </div>
                <div>
                    <h2 class="font-headline-lg text-on-surface leading-tight">199</h2>
                    <p class="font-label-bold text-on-surface-variant">แจ้งเหตุไฟไหม้ / ดับเพลิง</p>
                </div>
            </div>
            <span class="material-symbols-outlined text-4xl text-error">call</span>
        </a>
    </div>
</main>
</body>
</html>
