<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - Sweet Sixty</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; background-color: #E2E8F0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }</style>
</head>
<body>
    <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-sm mx-4">
        <h2 class="text-3xl font-extrabold text-gray-900 mb-2">ยินดีต้อนรับกลับ</h2>
        <p class="text-gray-500 mb-8 text-sm">กรุณาเข้าสู่ระบบเพื่อใช้งานต่อ</p>

        {% if form.errors %}
        <div class="bg-red-50 border border-red-200 text-red-600 text-sm rounded-xl px-4 py-3 mb-5">
            ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">
            <div class="space-y-4">
                <div>
                    <label class="text-xs text-gray-500 font-semibold uppercase tracking-wider ml-1 mb-2 block">ชื่อผู้ใช้</label>
                    <input type="text" name="username" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-purple-400" required autofocus>
                </div>
                <div>
                    <label class="text-xs text-gray-500 font-semibold uppercase tracking-wider ml-1 mb-2 block">รหัสผ่าน</label>
                    <input type="password" name="password" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-purple-400" required>
                </div>
                <button type="submit" class="w-full bg-purple-600 text-white py-4 rounded-[20px] font-semibold text-lg hover:bg-purple-700 transition">เข้าสู่ระบบ</button>
            </div>
        </form>

        <p class="text-center text-gray-500 text-sm mt-6">
            ยังไม่มีบัญชี? <a href="{% url 'register' %}" class="text-purple-600 font-bold hover:underline">สมัครสมาชิก</a>
        </p>
    </div>
</body>
</html>
