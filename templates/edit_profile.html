<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">
    <div class="w-[375px] h-[812px] bg-white rounded-[40px] shadow-2xl overflow-hidden relative border-[8px] border-black">
        
        <div class="p-6 pt-12 flex items-center border-b bg-white sticky top-0 z-10">
            <a href="{% url 'profile' %}" class="mr-4 text-gray-600 hover:text-purple-600 transition-colors">
                <i class="fa-solid fa-chevron-left text-xl"></i>
            </a>
            <h1 class="text-xl font-bold text-gray-800">แก้ไขข้อมูลส่วนตัว</h1>
        </div>

        <div class="p-6 space-y-6 overflow-y-auto h-[650px]">
            <p class="text-gray-500 text-xs italic">* ข้อมูลนี้จะถูกนำไปใช้ในการสมัครงานเพื่อให้ผู้จ้างงานติดต่อคุณได้</p>
            
            <form method="POST" class="space-y-5">
                {% csrf_token %}
                
                {% for field in form %}
                <div class="flex flex-col">
                    <label class="text-[10px] uppercase tracking-wider font-bold text-gray-400 mb-1 ml-1">
                        {{ field.label }}
                    </label>
                    {{ field }}
                    {% if field.errors %}
                        <p class="text-red-500 text-[10px] mt-1 ml-1">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
                {% endfor %}

                <div class="pt-4 pb-10">
                    <button type="submit" class="w-full bg-purple-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-purple-100 active:scale-95 transition-all hover:bg-purple-700">
                        บันทึกข้อมูล
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
