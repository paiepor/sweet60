<body class="bg-gray-100 flex justify-center items-center min-h-screen">
    <div class="w-[375px] h-[812px] bg-white rounded-[40px] shadow-2xl overflow-hidden relative border-[8px] border-black">
        
        <div class="p-6 pt-12 flex items-center border-b">
            <a href="{% url 'home' %}" class="mr-4">
                <i class="fa-solid fa-chevron-left text-xl text-gray-600"></i>
            </a>
            <h1 class="text-xl font-bold text-gray-800">ลงประกาศงาน</h1>
        </div>

        <div class="p-6 overflow-y-auto h-[650px]">
            <form method="POST" class="space-y-4">
                {% csrf_token %}
                {% for field in form %}
                <div class="flex flex-col">
                    <label class="text-sm font-semibold text-gray-700 mb-1">{{ field.label }}</label>
                    {{ field }}
                </div>
                {% endfor %}
                <button type="submit" class="w-full bg-purple-600 text-white py-4 rounded-2xl font-bold mt-6 shadow-lg active:scale-95 transition-all">
                    ยืนยันลงประกาศ
                </button>
            </form>
        </div>
    </div>
</body>
