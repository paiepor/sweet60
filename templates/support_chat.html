{% load static %}
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>แชทกับเรา - Sweet Sixty</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config = {darkMode: "class", theme: {extend: {colors: {"on-tertiary-container": "#fcfcff", "surface-dim": "#efd0f7", "secondary": "#744aa2", "primary-fixed": "#ffd8e8", "on-secondary-container": "#5a3086", "error-container": "#ffdad6", "on-secondary": "#ffffff", "outline-variant": "#ddbfca", "primary-fixed-dim": "#ffafd5", "background": "#fff7fb", "tertiary": "#006388", "tertiary-fixed": "#c5e7ff", "outline": "#8a707b", "tertiary-container": "#007dab", "secondary-fixed-dim": "#dbb8ff", "error": "#ba1a1a", "surface-container": "#fde7ff", "on-background": "#281330", "on-error-container": "#93000a", "surface": "#fff7fb", "on-primary-fixed": "#3d0027", "on-error": "#ffffff", "surface-bright": "#fff7fb", "on-surface": "#281330", "secondary-fixed": "#efdbff", "primary": "#af0a78", "on-primary": "#ffffff", "surface-container-high": "#fae0ff", "primary-container": "#cf3192", "on-primary-fixed-variant": "#8a005e", "secondary-container": "#cda0fe", "surface-variant": "#f8d8ff", "surface-container-highest": "#f8d8ff", "surface-container-low": "#ffefff", "on-surface-variant": "#57414a", "surface-container-lowest": "#ffffff", "on-tertiary": "#ffffff", "on-secondary-fixed-variant": "#5b3188"}, borderRadius: {DEFAULT: "1rem", lg: "2rem", xl: "3rem", full: "9999px"}}}};
</script>
<style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; min-height: max(884px, 100dvh); }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    #chat-messages { scroll-behavior: smooth; }
</style>
</head>
<body class="bg-background text-on-surface min-h-screen">

<!-- Header -->
<header class="fixed top-0 w-full z-50 bg-pink-50 border-b border-pink-100 shadow-[0_4px_16px_rgba(224,64,160,0.12)] flex items-center px-5 h-16">
    <a onclick="history.back()" class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-pink-100 active:scale-95 transition-all text-primary">
        <span class="material-symbols-outlined text-2xl">arrow_back</span>
    </a>
    <div class="ml-3 flex items-center gap-3">
        <div class="w-9 h-9 rounded-full bg-primary-fixed flex items-center justify-center">
            <span class="material-symbols-outlined text-primary text-xl" style="font-variation-settings:'FILL' 1">support_agent</span>
        </div>
        <div>
            <h1 class="font-bold text-base text-primary leading-tight">ทีมช่วยเหลือ Sweet Sixty</h1>
            <p class="text-xs text-on-surface-variant" id="status-text">ออนไลน์</p>
        </div>
    </div>
</header>

<!-- Chat Area -->
<main class="pt-20 pb-32 px-4 max-w-lg mx-auto flex flex-col gap-3" id="chat-messages">

    <!-- Date separator -->
    <div class="flex items-center gap-3 my-2">
        <div class="flex-1 h-px bg-outline-variant/40"></div>
        <span class="text-xs text-on-surface-variant font-medium px-2" id="date-label"></span>
        <div class="flex-1 h-px bg-outline-variant/40"></div>
    </div>

    <!-- Bot greeting (shown on load) -->
    <div class="flex items-end gap-2" id="initial-greeting">
        <div class="w-8 h-8 rounded-full bg-primary-fixed flex items-center justify-center flex-shrink-0 mb-1">
            <span class="material-symbols-outlined text-primary text-lg" style="font-variation-settings:'FILL' 1">support_agent</span>
        </div>
        <div class="max-w-[78%]">
            <div class="bg-white border border-pink-100 rounded-2xl rounded-bl-sm px-4 py-3 shadow-sm">
                <p class="text-sm text-on-surface leading-relaxed">สวัสดีค่ะ ยินดีต้อนรับสู่ศูนย์ช่วยเหลือ Sweet Sixty 💖<br>มีอะไรให้ช่วยเหลือได้บ้างคะ?</p>
            </div>
            <p class="text-xs text-on-surface-variant mt-1 ml-1" id="greeting-time"></p>
        </div>
    </div>

</main>

<!-- Input Bar -->
<div class="fixed bottom-0 left-0 w-full z-40 bg-white border-t border-pink-100 shadow-[0_-4px_16px_rgba(224,64,160,0.08)] px-4 py-3 pb-6">
    <div class="max-w-lg mx-auto flex items-end gap-3">
        <div class="flex-1 relative">
            <textarea id="msg-input" rows="1"
                placeholder="พิมพ์ข้อความ..."
                class="w-full resize-none rounded-2xl border-2 border-primary-fixed bg-pink-50 px-4 py-3 pr-12 text-sm text-on-surface placeholder-outline focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all leading-relaxed"
                style="max-height: 120px; overflow-y: auto;"
                onkeydown="handleKey(event)"></textarea>
        </div>
        <button onclick="sendMessage()"
            class="w-12 h-12 bg-primary rounded-full flex items-center justify-center shadow-[0_4px_12px_rgba(175,10,120,0.35)] active:scale-90 transition-all flex-shrink-0">
            <span class="material-symbols-outlined text-white text-xl" style="font-variation-settings:'FILL' 1">send</span>
        </button>
    </div>
</div>

<script>
const userName = "{{ user.get_full_name|default:user.username|escapejs }}";
let messageCount = 0;

// Auto-resize textarea
const input = document.getElementById('msg-input');
input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

function nowTime() {
    return new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', hour12: false });
}

function todayDate() {
    return new Date().toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' });
}

function isBusinessHours() {
    const now = new Date();
    const hour = now.getHours();
    const day = now.getDay(); // 0=Sun, 6=Sat
    return day >= 1 && day <= 5 && hour >= 9 && hour < 18;
}

// Set date label and greeting time on load
document.getElementById('date-label').textContent = todayDate();
document.getElementById('greeting-time').textContent = nowTime();

function appendUserMessage(text) {
    const container = document.getElementById('chat-messages');
    const el = document.createElement('div');
    el.className = 'flex justify-end';
    el.innerHTML = `
        <div class="max-w-[78%]">
            <div class="bg-primary text-on-primary rounded-2xl rounded-br-sm px-4 py-3 shadow-sm">
                <p class="text-sm leading-relaxed">${escapeHtml(text)}</p>
            </div>
            <p class="text-xs text-on-surface-variant mt-1 text-right mr-1">${nowTime()}</p>
        </div>`;
    container.appendChild(el);
    el.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function appendBotMessage(text, delayMs = 800) {
    return new Promise(resolve => {
        // Typing indicator
        const container = document.getElementById('chat-messages');
        const typing = document.createElement('div');
        typing.className = 'flex items-end gap-2';
        typing.id = 'typing-indicator';
        typing.innerHTML = `
            <div class="w-8 h-8 rounded-full bg-primary-fixed flex items-center justify-center flex-shrink-0 mb-1">
                <span class="material-symbols-outlined text-primary text-lg" style="font-variation-settings:'FILL' 1">support_agent</span>
            </div>
            <div class="bg-white border border-pink-100 rounded-2xl rounded-bl-sm px-4 py-3 shadow-sm">
                <div class="flex gap-1 items-center h-4">
                    <span class="w-2 h-2 bg-primary/40 rounded-full animate-bounce" style="animation-delay:0ms"></span>
                    <span class="w-2 h-2 bg-primary/40 rounded-full animate-bounce" style="animation-delay:150ms"></span>
                    <span class="w-2 h-2 bg-primary/40 rounded-full animate-bounce" style="animation-delay:300ms"></span>
                </div>
            </div>`;
        container.appendChild(typing);
        typing.scrollIntoView({ behavior: 'smooth', block: 'end' });

        setTimeout(() => {
            typing.remove();
            const el = document.createElement('div');
            el.className = 'flex items-end gap-2';
            el.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-primary-fixed flex items-center justify-center flex-shrink-0 mb-1">
                    <span class="material-symbols-outlined text-primary text-lg" style="font-variation-settings:'FILL' 1">support_agent</span>
                </div>
                <div class="max-w-[78%]">
                    <div class="bg-white border border-pink-100 rounded-2xl rounded-bl-sm px-4 py-3 shadow-sm">
                        <p class="text-sm text-on-surface leading-relaxed whitespace-pre-line">${text}</p>
                    </div>
                    <p class="text-xs text-on-surface-variant mt-1 ml-1">${nowTime()}</p>
                </div>`;
            container.appendChild(el);
            el.scrollIntoView({ behavior: 'smooth', block: 'end' });
            resolve();
        }, delayMs);
    });
}

function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getAutoResponse(text) {
    if (!isBusinessHours()) {
        return "สวัสดีค่ะ ขณะนี้อยู่นอกเวลาทำการของศูนย์ช่วยเหลือ Sweet Sixty\nทีมงานจะติดต่อกลับในเวลาทำการถัดไป (จันทร์–ศุกร์ 09:00–18:00 น.)\nขอบคุณสำหรับความเข้าใจค่ะ 💕";
    }
    const lower = text.toLowerCase();
    if (lower.includes('ชำระเงิน') || lower.includes('จ่ายเงิน') || lower.includes('payment')) {
        return "สวัสดีค่ะ หากพบปัญหาเกี่ยวกับการชำระเงิน รบกวนส่งข้อมูลต่อไปนี้ให้ทีมงานด้วยนะคะ:\n• เลขรายการ / วันเวลาที่ชำระ\n• ภาพหลักฐานการชำระเงิน\n• ช่องทางที่ใช้ชำระ\nทีมงานจะรีบตรวจสอบและแจ้งกลับโดยเร็วที่สุดค่ะ 🙏";
    }
    if (lower.includes('รหัสผ่าน') || lower.includes('เข้าสู่ระบบ') || lower.includes('login') || lower.includes('password')) {
        return "สวัสดีค่ะ หากไม่สามารถเข้าสู่ระบบได้ กรุณาแจ้งข้อมูลต่อไปนี้ค่ะ:\n• อีเมลหรือเบอร์โทรที่ใช้สมัครสมาชิก\n• ข้อความแสดงข้อผิดพลาด (ถ้ามี)\nทีมงานจะช่วยรีเซ็ตรหัสผ่านให้โดยเร็วที่สุดค่ะ 🔐";
    }
    if (messageCount === 1) {
        return "สวัสดีค่ะ ยินดีต้อนรับสู่ศูนย์ช่วยเหลือแอป Sweet Sixty 💖\nขอบคุณที่ติดต่อเข้ามานะคะ เพื่อให้ทีมงานช่วยได้รวดเร็วขึ้น รบกวนแจ้งข้อมูลเพิ่มเติมด้วยค่ะ:\n• ปัญหาที่พบ\n• รุ่นโทรศัพท์ / ระบบปฏิบัติการ\n• ภาพหน้าจอ (ถ้ามี)\nทีมงานจะรีบดูแลคุณค่ะ 😊";
    }
    return "ขอบคุณสำหรับข้อความค่ะ ทีมงานได้รับแล้วและจะรีบตอบกลับโดยเร็วที่สุดนะคะ 💕\nหากมีข้อมูลเพิ่มเติมสามารถส่งมาได้เลยค่ะ";
}

async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = 'auto';
    messageCount++;
    appendUserMessage(text);
    const reply = getAutoResponse(text);
    await appendBotMessage(reply, 900);
}

function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
}
</script>
</body>
</html>
